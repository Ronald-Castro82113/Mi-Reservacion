<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bootstrap</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- Columna izquierda: Login -->
            <div class="col-md-6 d-flex justify-content-center align-items-center ">
                <div class="card shadow p-4 w-75">
                    <h3 class="text-center mb-4">Iniciar Sesión</h3>
                    <form action="home.html" method="get">
                        <div class="mb-3">
                            <label for="usuario" class="form-label">Usuario</label>
                            <input type="text" class="form-control" id="usuario" placeholder="Ingrese su usuario">
                        </div>
                        <div class="mb-3">
                            <label for="contrasena" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="contrasena" placeholder="Ingrese su contraseña">
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">Acceder</button>
                            <p class="text-center">
                                <a href="" style="color: #a58620; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                            </p>
                        </div>
                        <p class="text-center mb-0">¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
                    </form>
                </div>
            </div>

            <!-- Columna derecha: Logo y texto -->
            <div class="col-md-6 d-flex flex-column justify-content-center align-items-center text-center p-4">
                <img src="img/travelTo.png" alt="Logo"  style="max-width: 500px;">
                <h3 style="color: #a58620;">¡Bienvenido!</h3>
                <h5>Compra y reserva tus boletos de manera fácil y rápida...</h5>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS (opcional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
