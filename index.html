<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | TravelTo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #208aa5;
            --brand-green: #4a6d52;
            --bg-light: #f8fafc;
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: #eef2f5; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1000px; /* Un poco más estrecho para que sea más elegante */
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.15);
            margin: 20px;
            display: flex;
        }

        /* Columna Izquierda: Minimalista */
        .branding-section {
            background: linear-gradient(135deg, var(--brand-blue) 0%, #156c82 100%);
            padding: 60px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 45%; /* Proporción más moderna */
        }

        .logo-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .logo-name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
        }

        .branding-section h3 {
            font-weight: 300;
            opacity: 0.9;
            font-size: 1.2rem;
        }

        /* Columna Derecha: Login */
        .login-section {
            padding: 80px 60px;
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }

        .form-control {
            background-color: #f8fafc;
            border: 2px solid #f1f5f9;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--brand-blue);
            box-shadow: 0 10px 20px -5px rgba(32, 138, 165, 0.15);
        }

        .btn-access {
            background: var(--brand-blue);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            border: none;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-access:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(32, 138, 165, 0.3);
            background: #1a7188;
        }

        .link-forgot {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .link-forgot:hover { color: var(--brand-blue); }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; max-width: 450px; }
            .branding-section { width: 100%; padding: 40px; }
            .login-section { width: 100%; padding: 40px 30px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="branding-section text-center">
            <div class="logo-icon">
                <i class="bi bi-droplet-half"></i>
            </div>
            <div class="logo-name">TravelTo</div>
            <h3>¡Qué bueno verte!</h3>
        </div>

        <div class="login-section">
            <div class="w-100 mx-auto" style="max-width: 340px;">
                <div class="mb-5">
                    <h2 class="fw-bold mb-2">Ingresar</h2>
                    <p class="text-muted small">Accede a tu cuenta para gestionar tus boletos.</p>
                </div>

                <form action="home.html" method="get">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" class="form-control" placeholder="nombre.usuario" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="text-end mb-4">
                        <a href="#" class="link-forgot font-weight-600">¿Olvidaste tu contraseña?</a>
                    </div>

                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-access">
                            Acceder <i class="bi bi-arrow-right-short ms-1"></i>
                        </button>
                    </div>

                    <div class="text-center">
                        <p class="small text-muted">¿No tienes cuenta? 
                            <a href="registro.html" class="fw-bold" style="color: var(--brand-blue); text-decoration: none;">Regístrate</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
