<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva o Compra de Boletos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .navbar-custom {
            background-color: #5e8d67;
        }
        .asiento {
            width: 50px;
            height: 50px;
            margin: 5px;
            background-color: #193f87;
            color: white;
            border-radius: 5px;
            text-align: center;
            line-height: 50px;
            cursor: pointer;
        }
        .asiento.seleccionado {
            background-color: #ffc107;
            color: black;
        }
        .asiento.exclusivo {
            background-color: #4aa9fc;
        }
        .asiento.exclusivo.seleccionado {
            background-color: #ffc107;
            color: black;
        }
        .fila {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .pasillo {
            width: 50px;
        }
    </style>
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom navbar-dark">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="home.html">
            <img src="img/logo_blanco.png" alt="Logo" width="100%" height="40" class="me-2"/>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link active" href="home.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Mis Reservas</a>
                </li>
                <li class="nav-item d-flex align-items-center">
                    <i class="bi bi-person-circle me-1" style="font-size: 1.4rem;"></i>
                    <span class="nav-link text-light mb-0" style="cursor: default;">{{ usuario }}</span>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-4">
    <h2 class="text-center mb-4">Reserva o Compra de Boletos</h2>

    <div class="card shadow p-4">
        <form id="formBoleto">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="transporte" class="form-label">Transporte</label>
                    <select id="transporte" class="form-select" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option>Transporte 1</option>
                        <option>Transporte 2</option>
                        <option>Transporte 3</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="nombres" class="form-label">Nombres</label>
                    <input type="text" id="nombres" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="apellidos" class="form-label">Apellidos</label>
                    <input type="text" id="apellidos" class="form-control" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="cedula" class="form-label">Cédula</label>
                    <input type="text" id="cedula" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="dia" class="form-label">Día</label>
                    <input type="date" id="dia" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="ruta" class="form-label">Ruta</label>
                    <select id="ruta" class="form-select" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option>Ciudad A → Ciudad B</option>
                        <option>Ciudad B → Ciudad A</option>
                    </select>
                </div>
            </div>

            <h5 class="mt-4 text-center">Seleccione sus Asientos</h5>

            <div class="mt-3">
                <!-- Estructura tipo bus -->
                <div class="fila">
                    <div class="asiento" data-num="1">1</div>
                    <div class="asiento" data-num="2">2</div>
                    <div class="pasillo"></div>
                    <div class="asiento" data-num="5">5</div>
                    <div class="asiento" data-num="6">6</div>
                </div>
                <div class="fila">
                    <div class="asiento" data-num="3">3</div>
                    <div class="asiento" data-num="4">4</div>
                    <div class="pasillo"></div>
                    <div class="asiento" data-num="9">9</div>
                    <div class="asiento" data-num="10">10</div>
                </div>
                <div class="fila">
                    <div class="asiento" data-num="7">7</div>
                    <div class="asiento" data-num="8">8</div>
                    <div class="pasillo"></div>
                    <div class="asiento" data-num="13">13</div>
                    <div class="asiento" data-num="14">14</div>
                </div>
                <div class="fila">
                    <div class="asiento" data-num="11">11</div>
                    <div class="asiento" data-num="12">12</div>
                    <div class="pasillo"></div>
                    <div class="asiento" data-num="17">17</div>
                    <div class="asiento" data-num="18">18</div>
                </div>
                <div class="fila">
                    <div class="asiento" data-num="15">15</div>
                    <div class="asiento" data-num="16">16</div>
                    <div class="pasillo"></div>
                    <div class="asiento" data-num="21">21</div>
                    <div class="asiento" data-num="22">22</div>
                </div>
                <div class="fila">
                    <div class="asiento" data-num="19">19</div>
                    <div class="asiento" data-num="20">20</div>
                    <div class="pasillo"></div>
                    <div class="asiento" data-num="25">25</div>
                    <div class="asiento" data-num="26">26</div>
                </div>
                <div class="fila">
                    <div class="asiento" data-num="23">23</div>
                    <div class="asiento" data-num="24">24</div>
                    <div class="pasillo"></div>
                    <div class="asiento" data-num="29">29</div>
                    <div class="asiento" data-num="30">30</div>
                </div>
                <!-- Asientos exclusivos -->
                <div class="fila">
                    <div class="asiento exclusivo" data-num="31">31</div>
                    <div class="asiento exclusivo" data-num="32">32</div>
                    <div class="pasillo"></div>
                    <div class="asiento exclusivo" data-num="33">33</div>
                    <div class="asiento exclusivo" data-num="34">34</div>
                </div>
                <div class="fila">
                    <div class="asiento exclusivo" data-num="35">35</div>
                    <div class="asiento exclusivo" data-num="36">36</div>
                    <div class="pasillo"></div>
                    <div class="asiento exclusivo" data-num="37">37</div>
                    <div class="asiento exclusivo" data-num="38">38</div>
                </div>
            </div>

            <div class="mt-4 text-center">
                <button type="button" class="btn btn-primary me-2" id="btnReservar">Reservar</button>
                <button type="button" class="btn btn-success" id="btnComprar">Comprar</button>
            </div>
        </form>
    </div>

    <div id="qrContainer" class="text-center mt-4" style="display: none;">
        <h5>Código QR de su boleto:</h5>
        <img id="qrImage" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Boleto%20Confirmado" alt="QR Code">
    </div>
</div>

<script>
    const asientosSeleccionados = [];

    document.querySelectorAll('.asiento').forEach(asiento => {
        asiento.addEventListener('click', () => {
            const num = asiento.getAttribute('data-num');
            if (asiento.classList.contains('seleccionado')) {
                asiento.classList.remove('seleccionado');
                const index = asientosSeleccionados.indexOf(num);
                if (index > -1) asientosSeleccionados.splice(index, 1);
            } else {
                asiento.classList.add('seleccionado');
                asientosSeleccionados.push(num);
            }
        });
    });

    document.getElementById('btnReservar').addEventListener('click', () => {
        if (validarFormulario()) {
            Swal.fire('¡Reserva Exitosa!', 'Asientos: ' + asientosSeleccionados.join(', '), 'success');
        }
    });

    document.getElementById('btnComprar').addEventListener('click', () => {
        if (validarFormulario()) {
            Swal.fire('¡Compra Exitosa!', 'Asientos: ' + asientosSeleccionados.join(', '), 'success');
            document.getElementById('qrImage').src =
                `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Boletos%20Asientos:%20${asientosSeleccionados.join(',')}`;
            document.getElementById('qrContainer').style.display = 'block';
        }
    });

    function validarFormulario() {
        const transporte = document.getElementById('transporte').value;
        const nombres = document.getElementById('nombres').value;
        const apellidos = document.getElementById('apellidos').value;
        const cedula = document.getElementById('cedula').value;
        const dia = document.getElementById('dia').value;
        const ruta = document.getElementById('ruta').value;

        if (!transporte || !nombres || !apellidos || !cedula || !dia || !ruta || asientosSeleccionados.length === 0) {
            Swal.fire('Error', 'Complete todos los campos y seleccione al menos un asiento.', 'error');
            return false;
        }
        return true;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
