<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | TravelTo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue: #208aa5;
            --brand-green: #4a6d52;
            --bg-light: #f8fafc;
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: #eef2f5; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.15);
            margin: 20px;
            display: flex;
        }

        /* Columna Izquierda (Branding Unificado) */
        .branding-section {
            background: linear-gradient(135deg, var(--brand-blue) 0%, #156c82 100%);
            padding: 60px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 40%;
        }

        .logo-icon { font-size: 4rem; margin-bottom: 0.5rem; }
        .logo-name { font-size: 2.2rem; font-weight: 700; letter-spacing: -1.5px; }

        /* Columna Derecha: Registro */
        .registro-section {
            padding: 50px 60px;
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .form-control {
            background-color: #f8fafc;
            border: 2px solid #f1f5f9;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--brand-blue);
            box-shadow: 0 10px 20px -5px rgba(32, 138, 165, 0.1);
            outline: none;
        }

        .btn-register {
            background: var(--brand-blue);
            color: white;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            border: none;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(32, 138, 165, 0.25);
            background: #1a7188;
        }

        /* Validación Bootstrap personalizada */
        .was-validated .form-control:invalid { border-color: #ff8080; }
        .was-validated .form-control:valid { border-color: #71dd37; }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; max-width: 450px; }
            .branding-section { width: 100%; padding: 40px; }
            .registro-section { width: 100%; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="branding-section text-center">
            <div class="logo-icon"><i class="bi bi-droplet-half"></i></div>
            <div class="logo-name">TravelTo</div>
            <h4 class="fw-light opacity-75 mt-2">Tu viaje comienza aquí</h4>
        </div>

        <div class="registro-section">
            <div class="w-100 mx-auto" style="max-width: 400px;">
                <div class="mb-4 text-center text-md-start">
                    <h2 class="fw-bold mb-1">Crear Cuenta</h2>
                    <p class="text-muted small">Únete a la comunidad de TravelTo hoy mismo.</p>
                </div>

                <form id="formRegistro" novalidate>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Nombres Completos</label>
                            <input type="text" class="form-control" placeholder="Juan Pérez" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Cédula de Identidad</label>
                            <input type="text" class="form-control" placeholder="1234567890" pattern="\d{10}" required title="Debe tener 10 dígitos">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Teléfono / WhatsApp</label>
                            <input type="tel" class="form-control" placeholder="09XXXXXXXX" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" placeholder="••••••••" minlength="6" required>
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-register">
                            Empezar ahora <i class="bi bi-person-plus ms-1"></i>
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <p class="small text-muted">¿Ya tienes cuenta? 
                            <a href="index.html" class="fw-bold" style="color: var(--brand-blue); text-decoration: none;">Inicia Sesión</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Lógica de validación rápida
        (() => {
            'use strict'
            const form = document.getElementById('formRegistro')
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })()
    </script>
</body>
</html>
