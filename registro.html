<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro</title>
    <link rel="stylesheet" href="css_index/css.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
</head>
<body>
    <div class="contenedor-principal">
        <div class="text-center mb-4">
            <img src="img/travelTo.png" alt="Logo" style="max-width: 250px; height: auto;" />
        </div>
        <form class="registro-form" action="#" method="POST" novalidate>
            <h2>Crear Cuenta</h2>
            <div class="mb-3">
                <label for="nombres" class="form-label">Nombres y Apellidos</label>
                <input type="text" class="form-control" id="nombres" name="nombres" placeholder="Juan Pérez" required />
                <div class="invalid-feedback">Por favor ingresa tus nombres completos.</div>
            </div>
            <div class="mb-3">
                <label for="documento" class="form-label">Cédula o Documento de Identidad</label>
                <input type="text" class="form-control" id="documento" name="documento" placeholder="1234567890" required pattern="\d{6,15}" />
                <div class="invalid-feedback">Ingresa un número válido (6 a 15 dígitos).</div>
            </div>
            <div class="mb-3">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="tel" class="form-control" id="telefono" name="telefono" placeholder="+593 9 1234 5678" required pattern="[\d\s+-]{7,15}" />
                <div class="invalid-feedback">Por favor ingresa un teléfono válido.</div>
            </div>
            <div class="mb-4">
                <label for="contrasena" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="contrasena" name="contrasena" placeholder="********" required minlength="6" />
                <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Registrarme</button>
            </div>
            <p class="texto-ayuda">¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a></p>
        </form>
    </div>
    <script>
        // Bootstrap validation example
        (() => {
          'use strict'

          const forms = document.querySelectorAll('form')

          Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
              if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
              }
              form.classList.add('was-validated')
            }, false)
          })
        })()
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
